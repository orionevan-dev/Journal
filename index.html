<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Journal">
<title>Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F6F2EA;
    --ink: #1C1812;
    --ink-mid: #6B6257;
    --ink-light: #B0A898;
    --ink-faint: #DDD8CE;
    --accent: #7A6248;
    --green: #5E8A5E;
    --red: #B85C45;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .screen {
    position: fixed; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
  }
  .screen.active { display: flex; }

  #loading-screen { font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-light); }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  #loading-screen span { animation: pulse 1.6s ease-in-out infinite; }

  #pin-screen { gap: 0; padding: 2rem; }
  .pin-logo { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: 1.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--ink-mid); margin-bottom: 2.5rem; }
  .pin-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 1.2rem; min-height: 1rem; text-align: center; }
  .pin-dots { display: flex; gap: 1rem; margin-bottom: 2.5rem; }
  .pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--ink-light); background: transparent; transition: background 0.15s, border-color 0.15s; }
  .pin-dot.filled { background: var(--ink); border-color: var(--ink); }
  .pin-dot.error  { background: var(--red); border-color: var(--red); }
  .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; width: 240px; margin-bottom: 1.5rem; }
  .pin-key { background: none; border: 1px solid var(--ink-faint); border-radius: 0; height: 58px; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.5rem; font-weight: 300; color: var(--ink); cursor: pointer; transition: background 0.1s; -webkit-appearance: none; }
  .pin-key:active { background: var(--ink-faint); }
  .pin-key.del { font-size: 1rem; color: var(--ink-mid); }
  .pin-key.empty { border-color: transparent; cursor: default; }
  .pin-setup-note { font-size: 0.75rem; color: var(--ink-light); font-style: italic; text-align: center; max-width: 220px; line-height: 1.6; }
  .pin-skip { background: none; border: none; font-family: 'EB Garamond', Georgia, serif; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-light); cursor: pointer; margin-top: 1.2rem; text-decoration: underline; text-underline-offset: 3px; }

  #auth-screen { gap: 1.5rem; padding: 2rem; text-align: center; }
  .auth-logo { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: 2.4rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink); }
  .auth-sub { font-size: 0.9rem; color: var(--ink-mid); font-style: italic; line-height: 1.7; max-width: 320px; }
  .auth-btn { display: flex; align-items: center; gap: 0.7rem; background: var(--ink); color: var(--bg); border: none; padding: 0.85rem 2rem; font-family: 'EB Garamond', Georgia, serif; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; margin-top: 0.5rem; -webkit-appearance: none; }
  .auth-note { font-size: 0.72rem; color: var(--ink-light); letter-spacing: 0.08em; max-width: 280px; line-height: 1.6; }

  #app { position: fixed; inset: 0; display: none; flex-direction: column; max-width: 680px; margin: 0 auto; }
  #app.active { display: flex; }

  header { display: flex; align-items: center; justify-content: space-between; padding: calc(var(--safe-top) + 1rem) 1.5rem 1rem; border-bottom: 1px solid var(--ink-faint); flex-shrink: 0; }
  .logo { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: 1.15rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-mid); }
  .header-right { display: flex; align-items: center; gap: 1.2rem; }
  .nav-btn { background: none; border: none; cursor: pointer; font-family: 'EB Garamond', Georgia, serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-light); padding-bottom: 2px; border-bottom: 1px solid transparent; transition: color 0.2s, border-color 0.2s; }
  .nav-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
  #sync-badge { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--ink-light); opacity: 0; transition: opacity 0.3s, color 0.3s; white-space: nowrap; }
  #sync-badge.visible { opacity: 1; }
  #sync-badge.synced { color: var(--green); }
  #sync-badge.error  { color: var(--red); }

  main { flex: 1; overflow-y: auto; padding: 2rem 1.5rem calc(var(--safe-bottom) + 2rem); -webkit-overflow-scrolling: touch; }

  #write-view { display: flex; flex-direction: column; height: 100%; }
  .date-label { font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 0.4rem; }
  .page-title { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: 1.9rem; color: var(--ink); line-height: 1.2; margin-bottom: 1.8rem; }
  #prompt-line { font-style: italic; font-size: 0.95rem; color: var(--ink-light); margin-bottom: 1.5rem; cursor: text; min-height: 1.4rem; transition: opacity 0.3s; }
  #editor { flex: 1; width: 100%; min-height: 300px; background: transparent; border: none; outline: none; resize: none; font-family: 'EB Garamond', Georgia, serif; font-size: 1.1rem; line-height: 1.9; color: var(--ink); letter-spacing: 0.01em; caret-color: var(--accent); -webkit-appearance: none; }
  #editor::placeholder { color: var(--ink-faint); font-style: italic; }
  .write-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; margin-top: 1rem; border-top: 1px solid var(--ink-faint); flex-shrink: 0; }
  .word-count { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-light); }
  .save-btn { background: var(--ink); color: var(--bg); border: none; padding: 0.55rem 1.4rem; font-family: 'EB Garamond', Georgia, serif; font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; -webkit-appearance: none; border-radius: 0; }
  .save-btn:disabled { opacity: 0.35; cursor: default; }

  #history-view { display: none; }
  .history-title { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: 1.9rem; margin-bottom: 1.8rem; }
  .history-item { padding: 1.2rem 0; border-bottom: 1px solid var(--ink-faint); cursor: pointer; transition: padding-left 0.15s; }
  .history-item:hover, .history-item:active { padding-left: 0.5rem; }
  .h-date { font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 0.3rem; }
  .h-preview { font-size: 0.97rem; color: var(--ink-mid); line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .h-words { font-size: 0.65rem; letter-spacing: 0.12em; color: var(--ink-light); margin-top: 0.35rem; }
  .empty-state { padding: 4rem 0; text-align: center; font-style: italic; color: var(--ink-light); font-size: 1rem; }
</style>
</head>
<body>

<div id="loading-screen" class="screen active"><span>Loading…</span></div>

<div id="pin-screen" class="screen">
  <div class="pin-logo">Journal</div>
  <div class="pin-label" id="pin-label">Enter your passcode</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key empty" disabled></button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
  <div id="pin-setup-note" class="pin-setup-note" style="display:none">Choose a 4-digit passcode to protect your journal.</div>
  <button class="pin-skip" id="pin-skip-btn" onclick="pinSkip()" style="display:none">Skip — no passcode</button>
</div>

<div id="auth-screen" class="screen">
  <div class="auth-logo">Journal</div>
  <p class="auth-sub">A quiet place for daily reflection.<br>Your entries back up to your own Google Drive.</p>
  <button class="auth-btn" onclick="signIn()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
    Connect Google Drive
  </button>
  <p class="auth-note">Sign in once. Entries are saved to journal-entries.json in your Drive.</p>
</div>

<div id="app">
  <header>
    <span class="logo">Journal</span>
    <div class="header-right">
      <span id="sync-badge"></span>
      <button class="nav-btn active" id="btn-write" onclick="showView('write')">Today</button>
      <button class="nav-btn" id="btn-history" onclick="showView('history')">Archive</button>
    </div>
  </header>
  <main>
    <div id="write-view">
      <div class="date-label" id="date-label"></div>
      <h1 class="page-title" id="page-title"></h1>
      <div id="prompt-line"></div>
      <textarea id="editor" oninput="onEdit()" placeholder="Begin writing…"></textarea>
      <div class="write-footer">
        <span class="word-count" id="word-count">0 words</span>
        <button class="save-btn" id="save-btn" onclick="manualSave()" disabled>Save to Drive</button>
      </div>
    </div>
    <div id="history-view">
      <h1 class="history-title">Archive</h1>
      <div id="history-list"></div>
    </div>
  </main>
</div>

<script>
const CLIENT_ID = '281519583513-1j3gf59ugerfspfcm94aums3jj3ds6n9.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const FILE_NAME = 'journal-entries.json';
const PROMPTS = ["What made you smile today?","What challenged you, and how did you meet it?","Something you're grateful for right now…","A moment you want to remember.","What are you looking forward to?","How are you really feeling?","What did you learn today?"];

let tokenClient, accessToken = null;
let entries = {}, selectedDate = todayKey(), driveFileId = null, saveTimer = null;
let pinBuffer = '', pinMode = 'enter', pinFirstEntry = '';

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(iso) {
  return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function wordCount(t) { return t.trim() ? t.trim().split(/\s+/).length : 0; }
function todayPrompt() { return PROMPTS[new Date().getDay() % PROMPTS.length]; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('app').classList.remove('active');
  if (id === 'app') document.getElementById('app').classList.add('active');
  else document.getElementById(id).classList.add('active');
}

function pinPress(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(handlePinComplete, 100);
}
function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); }
function updatePinDots(state='normal') {
  for (let i=0;i<4;i++) {
    const d = document.getElementById('d'+i);
    d.className = 'pin-dot';
    if (state==='error') d.classList.add('error');
    else if (i < pinBuffer.length) d.classList.add('filled');
  }
}
function handlePinComplete() {
  const stored = localStorage.getItem('journal_pin');
  if (pinMode === 'enter') {
    if (pinBuffer === stored) {
      sessionStorage.setItem('pin_ok','1');
      proceedToApp();
    } else {
      updatePinDots('error');
      document.getElementById('pin-label').textContent = 'Incorrect — try again';
      setTimeout(() => { pinBuffer=''; updatePinDots(); document.getElementById('pin-label').textContent='Enter your passcode'; }, 800);
    }
  } else if (pinMode === 'setup-first') {
    pinFirstEntry = pinBuffer; pinBuffer = ''; updatePinDots();
    pinMode = 'setup-confirm';
    document.getElementById('pin-label').textContent = 'Confirm your passcode';
    document.getElementById('pin-setup-note').style.display = 'none';
  } else if (pinMode === 'setup-confirm') {
    if (pinBuffer === pinFirstEntry) {
      localStorage.setItem('journal_pin', pinBuffer);
      sessionStorage.setItem('pin_ok','1');
      proceedToApp();
    } else {
      updatePinDots('error');
      document.getElementById('pin-label').textContent = "Didn't match — start again";
      setTimeout(() => { pinBuffer=''; pinFirstEntry=''; pinMode='setup-first'; updatePinDots(); document.getElementById('pin-label').textContent='Choose a passcode'; document.getElementById('pin-setup-note').style.display='block'; }, 800);
    }
  }
}
function pinSkip() { localStorage.setItem('journal_pin',''); sessionStorage.setItem('pin_ok','1'); proceedToApp(); }
function showPinScreen() {
  const stored = localStorage.getItem('journal_pin');
  pinBuffer = '';
  if (stored === null) {
    pinMode = 'setup-first';
    document.getElementById('pin-label').textContent = 'Choose a passcode';
    document.getElementById('pin-setup-note').style.display = 'block';
    document.getElementById('pin-skip-btn').style.display = 'block';
  } else if (stored === '') {
    proceedToApp(); return;
  } else {
    pinMode = 'enter';
    document.getElementById('pin-label').textContent = 'Enter your passcode';
    document.getElementById('pin-setup-note').style.display = 'none';
    document.getElementById('pin-skip-btn').style.display = 'none';
  }
  updatePinDots();
  showScreen('pin-screen');
}

function proceedToApp() {
  const saved = localStorage.getItem('gd_token');
  if (saved) { showScreen('loading-screen'); silentSignIn(saved); }
  else showScreen('auth-screen');
}

function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showScreen('auth-screen'); return; }
      accessToken = resp.access_token;
      localStorage.setItem('gd_token', accessToken);
      await loadFromDrive();
      showApp();
    }
  });
}

function signIn() { tokenClient.requestAccessToken({ prompt: 'consent' }); }

async function silentSignIn(saved) {
  try {
    const r = await fetch('https://www.googleapis.com/drive/v3/about?fields=user', { headers: { Authorization: 'Bearer '+saved } });
    if (r.ok) { accessToken = saved; await loadFromDrive(); showApp(); return; }
  } catch(e) {}
  try {
    await new Promise((res, rej) => {
      tokenClient.callback = async (resp) => {
        if (resp.error) { rej(resp.error); return; }
        accessToken = resp.access_token;
        localStorage.setItem('gd_token', accessToken);
        res();
      };
      tokenClient.requestAccessToken({ prompt: '' });
    });
    await loadFromDrive();
    showApp();
  } catch(e) {
    localStorage.removeItem('gd_token');
    showScreen('auth-screen');
  }
}

async function driveRequest(url, options={}) {
  const r = await fetch(url, { ...options, headers: { Authorization: 'Bearer '+accessToken, ...options.headers } });
  if (r.status === 401) { localStorage.removeItem('gd_token'); showScreen('auth-screen'); throw new Error('Auth expired'); }
  return r;
}
async function findFile() {
  const r = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=name%3D'${FILE_NAME}'+and+trashed%3Dfalse&fields=files(id,name)`);
  return (await r.json()).files?.[0]?.id || null;
}
async function loadFromDrive() {
  try {
    driveFileId = await findFile();
    if (!driveFileId) return;
    const r = await driveRequest(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
    const arr = await r.json();
    entries = {};
    if (Array.isArray(arr)) arr.forEach(e => { entries[e.date] = e; });
  } catch(e) { console.warn('Load error:', e); }
}
async function saveToDrive() {
  const body = JSON.stringify(Object.values(entries), null, 2);
  if (!driveFileId) {
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({name:FILE_NAME,mimeType:'application/json'})],{type:'application/json'}));
    form.append('file', new Blob([body],{type:'application/json'}));
    const r = await driveRequest('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',body:form});
    driveFileId = (await r.json()).id;
  } else {
    await driveRequest(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:'PATCH',headers:{'Content-Type':'application/json'},body});
  }
}

function setSyncStatus(status, msg) {
  const b = document.getElementById('sync-badge');
  b.className = 'visible '+status;
  b.textContent = {syncing:'↻ Saving…', synced:'✓ Saved to Drive', error:'✕ '+(msg||'')}[status]||'';
  if (status==='synced'||status==='error') setTimeout(()=>b.classList.remove('visible'),3000);
}
async function doSave(date, text) {
  if (!text.trim()) return;
  setSyncStatus('syncing');
  entries[date] = { date, text, updatedAt: new Date().toISOString() };
  try { await saveToDrive(); setSyncStatus('synced'); }
  catch(e) { setSyncStatus('error', e.message); }
}
function onEdit() {
  const text = document.getElementById('editor').value;
  const wc = wordCount(text);
  document.getElementById('word-count').textContent = wc+(wc===1?' word':' words');
  document.getElementById('save-btn').disabled = !text.trim();
  document.getElementById('prompt-line').style.opacity = text ? '0' : '1';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => doSave(selectedDate, text), 1800);
}
async function manualSave() { clearTimeout(saveTimer); await doSave(selectedDate, document.getElementById('editor').value); }

function showView(v) {
  document.getElementById('write-view').style.display = v==='write' ? 'flex' : 'none';
  document.getElementById('history-view').style.display = v==='history' ? 'block' : 'none';
  document.getElementById('btn-write').className = 'nav-btn'+(v==='write'?' active':'');
  document.getElementById('btn-history').className = 'nav-btn'+(v==='history'?' active':'');
  if (v==='write') loadWriteView(selectedDate);
  if (v==='history') renderHistory();
}
function loadWriteView(date) {
  selectedDate = date;
  const isToday = date === todayKey();
  document.getElementById('date-label').textContent = isToday ? 'Today' : 'Past Entry';
  document.getElementById('page-title').textContent = formatDate(date);
  const text = entries[date]?.text || '';
  document.getElementById('editor').value = text;
  document.getElementById('save-btn').disabled = !text.trim();
  const wc = wordCount(text);
  document.getElementById('word-count').textContent = wc+(wc===1?' word':' words');
  const p = document.getElementById('prompt-line');
  p.textContent = isToday ? todayPrompt() : '';
  p.style.opacity = text ? '0' : '1';
  if (isToday) setTimeout(()=>document.getElementById('editor').focus(),100);
}
function renderHistory() {
  const list = document.getElementById('history-list');
  const dates = Object.keys(entries).sort((a,b)=>b.localeCompare(a));
  if (!dates.length) { list.innerHTML='<div class="empty-state">No entries yet. Start writing today.</div>'; return; }
  list.innerHTML = dates.map(d => {
    const e = entries[d], wc = wordCount(e.text), isToday = d===todayKey();
    return `<div class="history-item" onclick="openEntry('${d}')">
      <div class="h-date">${isToday?'Today · ':''}${formatDate(d)}</div>
      <div class="h-preview">${e.text.replace(/</g,'&lt;')}</div>
      <div class="h-words">${wc} ${wc===1?'word':'words'}</div>
    </div>`;
  }).join('');
}
function openEntry(date) { selectedDate = date; showView('write'); }

function showApp() {
  showScreen('app');
  selectedDate = todayKey();
  showView('write');
}

window.onload = () => {
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = () => {
    initGIS();
    if (sessionStorage.getItem('pin_ok')) proceedToApp();
    else showPinScreen();
  };
  script.onerror = () => {
    document.getElementById('loading-screen').innerHTML = '<span style="color:#B85C45">Could not load Google Sign-In. Check your connection.</span>';
  };
  document.head.appendChild(script);
};
</script>
</body>
</html>
